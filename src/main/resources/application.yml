spring:
  application:
    name: expense-tracker-api
  datasource:
    url: jdbc:h2:mem:expenses;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8081

springdoc:
  swagger-ui:
    path: /swagger-ui.html
