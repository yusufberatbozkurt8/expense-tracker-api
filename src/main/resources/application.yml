spring:
  application:
    name: expense-tracker-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:h2:mem:expenses;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8081
  error:
    include-message: never
    include-stacktrace: never

app:
  security:
    enabled: true
    api-key: ${API_KEY:}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
